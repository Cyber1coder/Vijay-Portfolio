    <script>
    const texts = ["Video Editor", "Graphics Designer"];
    const typingSpeed = 100;   // speed of typing
    const deletingSpeed = 60;  // speed of deleting
    const delayBetween = 1500; // wait before deleting

    let textIndex = 0;
    let charIndex = 0;
    let isDeleting = false;

    const typeText = document.getElementById("type-text");

    function typeEffect() {
        const currentText = texts[textIndex];

        if (!isDeleting) {
            // Typing
            typeText.textContent = currentText.substring(0, charIndex + 1);
            charIndex++;

            if (charIndex === currentText.length) {
                setTimeout(() => isDeleting = true, delayBetween);
            }
        } else {
            // Deleting
            typeText.textContent = currentText.substring(0, charIndex - 1);
            charIndex--;

            if (charIndex === 0) {
                isDeleting = false;
                textIndex = (textIndex + 1) % texts.length;
            }
        }

        setTimeout(typeEffect, isDeleting ? deletingSpeed : typingSpeed);
    }

    typeEffect();
</script>
